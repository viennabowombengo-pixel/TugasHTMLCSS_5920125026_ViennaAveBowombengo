<!DOCTYPE html>
<html>
<head>
    <title>Background Image Element</title>

    <style>
        body{
            background-color:#e5e1d8;
            font-family:Times New Roman;
        }

        .box{
            width:900px;
            height:350px;
            margin:50px auto;
            padding:25px;
            color:white;

            /* Background motif */
            background-color:#2f2a24;

            background-image:
            radial-gradient(circle, rgba(255,255,255,0.15) 2px, transparent 2px),
            radial-gradient(circle, rgba(255,255,255,0.1) 3px, transparent 3px),
            linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%);

            background-size:40px 40px, 60px 60px, 80px 80px;
        }

        h1{
            font-size:60px;
            margin-bottom:20px;
        }

        h2{
            font-size:40px;
            margin-bottom:15px;
        }

        p{
            font-size:28px;
            line-height:1.5;
            width:850px;
        }
    </style>
</head>

<body>

    <div class="box">

        <h1>Planting Guide</h1>

        <h2>Magnolia</h2>

        <p>
            Magnolia grandiflora, commonly known as the Southern magnolia 
            or bull bay, is a tree of the family Magnoliaceae native to 
            the southeastern United States.
        </p>

    </div>

</body>
</html>
