<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons Latihan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f3f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 20px;
            margin: 0;
        }

        /* Base / Gaya Dasar Tombol */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            min-width: 180px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: bold;
            color: #555555;
            background: linear-gradient(to bottom, #ffffff, #e6e6e6);
            border: 1px solid #cccccc;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 2px 3px rgba(0, 0, 0, 0.1), inset 0 1px 0 #ffffff;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Icon di dalam tombol */
        .btn-icon {
            display: flex;
            align-items: center;
            font-size: 16px;
            color: #666666;
        }

        /* ----------------------------------------------- */
        /* HOVER STATE (Saat Kursor di Atas Tombol)        */
        /* ----------------------------------------------- */
        .btn:hover {
            color: #60712a; /* Warna teks berubah agak hijau/zaitun */
            border-color: #b5c48c;
            background: linear-gradient(to bottom, #ffffff, #f1f5e6);
        }

        .btn:hover .btn-icon {
            color: #60712a; /* Warna ikon ikut berubah */
        }

        /* ----------------------------------------------- */
        /* ACTIVE STATE (Saat Tombol Diklik/Ditekan)      */
        /* ----------------------------------------------- */
        .btn:active {
            background: #e0e0e0;
            border-color: #bbbbbb;
            box-shadow: inset 0 3px 5px rgba(0, 0, 0, 0.15); /* Efek mendalam */
            transform: translateY(1px); /* Tombol seolah turun sedikit */
        }
    </style>
</head>
<body>

    <button class="btn">
        <span>Add To Basket</span>
        <span class="btn-icon">&#8853;</span> 
    </button>

    <button class="btn">
        <span>Framing Options</span>
        <span class="btn-icon">&#9645;</span>
    </button>

</body>
</html>
