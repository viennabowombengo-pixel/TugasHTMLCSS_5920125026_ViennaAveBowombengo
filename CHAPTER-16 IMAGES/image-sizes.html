<!DOCTYPE html>
<html lang="en">
<head>
    <title>image sizes</title>
    <style>
        img.large { 
            width: 500px; 
            height: 500px;} 
            img.medium { 
                width: 250px; 
                height: 250px;} 
            img.small { 
                width: 100px; 
                height: 100px;}
    </style>
</head>
<body>
    <img src="images/bunga.jpg" class="large" alt="Bunga" /> 
    <img src="images/bunga.jpg" class="medium" alt="Bunga" /> 
    <img src="images/bunga.jpg" class="small" alt="Bunga" />
</body>
</html>
