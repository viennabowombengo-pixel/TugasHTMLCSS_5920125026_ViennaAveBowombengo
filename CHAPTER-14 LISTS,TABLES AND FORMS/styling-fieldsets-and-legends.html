<!DOCTYPE html>
<html lang="en">
<head>
    <title>styling fieldsets and legends</title>
    <style>
        fieldset { 
            width: 350px; 
            border: 1px solid #dcdcdc; 
            border-radius: 10px; 
            padding: 20px; 
            text-align: right;} 
        legend { 
            background-color: #efefef; 
            border: 1px solid #dcdcdc; 
            border-radius: 10px; 
            padding: 10px 20px; 
            text-align: left; 
            text-transform: uppercase;}
    </style>
</head>
<body>
    <fieldset style="border: 1px solid #ccc; border-radius: 12px; padding: 25px 30px; width: 450px; font-family: Arial, sans-serif; background-color: transparent; margin: 50px auto;">
    <legend style="font-size: 14px; font-weight: bold; color: #555; letter-spacing: 1px; padding: 6px 16px; border: 1px solid #ccc; border-radius: 6px; background: linear-gradient(to bottom, #ffffff, #e6e6e6);">NEWSLETTER</legend>

    <div style="display: flex; align-items: center; margin-bottom: 20px;">
        <label style="width: 70px; font-size: 16px; color: #444;">Name:</label>
        <input type="text" style="flex: 1; border: none; border-bottom: 1px solid #b0b0b0; background: transparent; padding: 5px 0; font-size: 16px; outline: none;">
    </div>

    <div style="display: flex; align-items: center; margin-bottom: 20px;">
        <label style="width: 70px; font-size: 16px; color: #444;">Email:</label>
        <input type="email" style="flex: 1; border: none; border-bottom: 1px solid #b0b0b0; background: transparent; padding: 5px 0; font-size: 16px; outline: none;">
    </div>

    <div style="display: flex; justify-content: flex-end; margin-top: 15px;">
        <button style="background: linear-gradient(to bottom, #6d645e, #524a45); color: #e0dcd9; border: 1px solid #4a423d; border-radius: 6px; padding: 8px 20px; font-size: 14px; cursor: pointer;">Subscribe</button>
    </div>
</fieldset>
</body>
</html>
