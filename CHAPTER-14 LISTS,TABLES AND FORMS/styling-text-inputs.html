<!DOCTYPE html>
<html lang="en">
<head>
    <title>styling text inputs</title>
    <style>
        input { 
            font-size: 120%; 
            color: #5a5854; 
            background-color: #f2f2f2; 
            border: 1px solid #bdbdbd; 
            border-radius: 5px; 
            padding: 5px 5px 5px 30px; 
            background-repeat: no-repeat; 
            background-position: 8px 9px; 
            display: block; 
            margin-bottom: 10px;} 
        input:focus { 
            background-color: #ffffff; 
            border: 1px solid #b1e1e4;} 
        input#email { 
            background-image: url("images/email.png");} 
        input#twitter { 
            background-image: url("images/twitter.png");} 
        input#web { 
            background-image: url("images/web.png");}
    </style>
</head>
<body>
    <div class="form-container">
        
        <div class="input-group">
            <div class="input-icon">
                <i class="fa-regular fa-envelope"></i>
            </div>
            <input type="email" class="input-field" placeholder="Email Anda...">
        </div>

        <div class="input-group">
            <div class="input-icon">
                <i class="fa-brands fa-twitter"></i>
            </div>
            <input type="text" class="input-field" placeholder="Username Twitter...">
        </div>

        <div class="input-group">
            <div class="input-icon">
                <i class="fa-solid fa-earth-americas"></i>
            </div>
            <input type="url" class="input-field" placeholder="Website Anda...">
        </div>
    </div>
</body>
</html>
